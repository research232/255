<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TANSCA Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f2f5; }
        .login-box, .dashboard { max-width: 500px; margin: 50px auto; background: white; padding: 30px; border-radius: 20px; }
        input, button, select, textarea { width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; }
        button { background: #1e6b3e; color: white; cursor: pointer; }
        .error { color: red; }
        .success { color: green; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>
<body>

<div id="loginBox" class="login-box">
    <h2>TANSCA Admin</h2>
    <div id="loginError" class="error"></div>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Ingia</button>
</div>

<div id="dashboard" class="dashboard" style="display:none">
    <h2>Dashboard</h2>
    <button onclick="logout()">Ondoka</button>
    <hr>
    <h3>Ongeza Taarifa</h3>
    <input type="text" id="title" placeholder="Kichwa">
    <select id="category">
        <option>Habari</option><option>Utafiti</option><option>Tukio</option><option>Tangazo</option>
    </select>
    <textarea id="content" placeholder="Maelezo"></textarea>
    <input type="file" id="imageFile" accept="image/*">
    <input type="date" id="date">
    <button onclick="addPost()">Hifadhi</button>
    <div id="msg"></div>
    <hr>
    <h3>Taarifa Zote</h3>
    <div id="postsList"></div>
</div>

<script>
    const SUPABASE_URL = 'https://khrddmxcnenvkfypakfa.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_aYrzOYt1BFRW1ThGVqsZMw_tr_rg0BQ';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let currentImageData = null;

    function login() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        if (user === 'afisa' && pass === '1234') {
            sessionStorage.setItem('admin_logged_in', 'true');
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadPosts();
        } else {
            document.getElementById('loginError').innerText = 'Username au password si sahihi!';
        }
    }

    function logout() {
        sessionStorage.removeItem('admin_logged_in');
        location.reload();
    }

    document.getElementById('imageFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file && file.size <= 2 * 1024 * 1024) {
            const reader = new FileReader();
            reader.onload = ev => { currentImageData = ev.target.result; };
            reader.readAsDataURL(file);
        } else if (file) { alert('Picha kubwa kuliko 2MB!'); }
    });

    async function addPost() {
        const title = document.getElementById('title').value;
        const content = document.getElementById('content').value;
        const category = document.getElementById('category').value;
        const date = document.getElementById('date').value;
        if (!title || !content) { alert('Jaza kichwa na maelezo!'); return; }
        
        const newPost = {
            title, content, category,
            image: currentImageData || '',
            date: date || new Date().toISOString().split('T')[0],
            views: 0
        };
        
        const { error } = await supabaseClient.from('posts').insert([newPost]);
        if (error) {
            document.getElementById('msg').innerHTML = `<span class="error">Error: ${error.message}</span>`;
        } else {
            document.getElementById('msg').innerHTML = '<span class="success">Taarifa imeongezwa!</span>';
            document.getElementById('title').value = '';
            document.getElementById('content').value = '';
            document.getElementById('imageFile').value = '';
            currentImageData = null;
            loadPosts();
        }
    }

    async function loadPosts() {
        const { data, error } = await supabaseClient.from('posts').select('*').order('created_at', { ascending: false });
        if (error) { document.getElementById('postsList').innerHTML = `<p class="error">Error: ${error.message}</p>`; return; }
        if (!data || data.length === 0) { document.getElementById('postsList').innerHTML = '<p>Hakuna taarifa</p>'; return; }
        
        let html = '<table><tr><th>Kichwa</th><th>Aina</th><th>Tarehe</th><th>Views</th><th>Kitendo</th></tr>';
        data.forEach(post => {
            html += `<tr>
                <td>${post.title.substring(0, 30)}</td>
                <td>${post.category}</td>
                <td>${post.date}</td>
                <td>${post.views || 0}</td>
                <td><button onclick="deletePost(${post.id})">Futa</button></td>
            </tr>`;
        });
        html += '</table>';
        document.getElementById('postsList').innerHTML = html;
    }

    async function deletePost(id) {
        if (confirm('Futa?')) {
            await supabaseClient.from('posts').delete().eq('id', id);
            loadPosts();
        }
    }

    if (sessionStorage.getItem('admin_logged_in') === 'true') {
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadPosts();
    }
</script>
</body>
</html>
